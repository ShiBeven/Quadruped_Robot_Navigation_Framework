# =============================================================================
# 控制器 —— 四足 PID 参数全面下调
# =============================================================================
controller_server:
  ros__parameters:
    use_sim_time: false
    odom_topic: odometry
    controller_frequency: 20.0
    min_x_velocity_threshold: 0.5     # 下调: 四足最低线速度
    min_y_velocity_threshold: 0.3
    min_theta_velocity_threshold: 0.01
    failure_tolerance: 0.3
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.6
      movement_time_allowance: 10.0
    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.15
      yaw_goal_tolerance: 6.28
    FollowPath:
      plugin: "omni_pid_pursuit_controller::OmniPidPursuitController"
      # PID —— 四足大幅下调
      translation_kp: 1.5             # 3.0 → 1.5
      translation_ki: 0.05            # 0.1 → 0.05
      translation_kd: 0.1             # 0.3 → 0.1
      enable_rotation: true           # false → true (四足可能需要先转身)
      rotation_kp: 1.0
      rotation_ki: 0.05
      rotation_kd: 0.1
      transform_tolerance: 0.1
      min_max_sum_error: 1.0
      # 预瞄距离
      lookahead_dist: 1.0             # 2.0 → 1.0 (速度慢，缩短)
      use_velocity_scaled_lookahead_dist: true
      lookahead_time: 1.0
      min_lookahead_dist: 0.3         # 0.5 → 0.3
      max_lookahead_dist: 1.5         # 1.0 → 1.5
      use_interpolation: false
      use_rotate_to_heading: true     # false → true
      use_rotate_to_heading_treshold: 0.1
      # 速度限制 —— 四足大幅下调
      min_approach_linear_velocity: 0.1   # 0.5 → 0.1
      approach_velocity_scaling_dist: 1.0
      v_linear_min: -1.5              # -4.5 → -1.5
      v_linear_max: 1.5               # 4.5 → 1.5
      v_angular_min: -1.5             # -3.0 → -1.5
      v_angular_max: 1.5              # 3.0 → 1.5
      # 曲率限制
      curvature_min: 1.0              # 2.5 → 1.0 (更早减速)
      curvature_max: 3.0              # 5.0 → 3.0
      reduction_ratio_at_high_curvature: 0.4  # 0.5 → 0.4 (更保守)
      curvature_forward_dist: 0.7
      curvature_backward_dist: 0.3
      max_velocity_scaling_factor_rate: 0.9

# =============================================================================
# 局部代价地图 —— 四足 footprint 更大
# =============================================================================
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 10.0
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 6                       # 5 → 6 (制动距离更长)
      height: 6                      # 5 → 6
      resolution: 0.05
      robot_radius: 0.45             # 0.3 → 0.45 (四足躯干+腿部外展)
      plugins: ["static_layer", "intensity_voxel_layer", "inflation_layer"]
      intensity_voxel_layer:
        plugin: nav2_plugins::IntensityVoxelLayer
        enabled: true
        track_unknown_space: true
        footprint_clearing_enabled: true
        publish_voxel_map: false
        combination_method: 1
        mark_threshold: 0
        origin_z: 0.0
        unknown_threshold: 5
        z_resolution: 0.05
        z_voxels: 16
        min_obstacle_height: 0.0
        max_obstacle_height: 2.0
        min_obstacle_intensity: 0.1
        max_obstacle_intensity: 2.0
        observation_sources: terrain_map
        terrain_map:
          data_type: PointCloud2
          topic: <robot_namespace>/terrain_map
          sensor_frame: front_mid360
          min_obstacle_height: 0.0
          max_obstacle_height: 2.0
          obstacle_max_range: 5.0
          obstacle_min_range: 0.2
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 4.0
        inflation_radius: 0.6         # 0.4 → 0.6
      always_send_full_costmap: False

# =============================================================================
# 全局代价地图
# =============================================================================
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: map
      robot_base_frame: base_footprint
      robot_radius: 0.45             # 0.3 → 0.45
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "intensity_voxel_layer", "inflation_layer"]
      intensity_voxel_layer:
        plugin: nav2_plugins::IntensityVoxelLayer
        enabled: true
        track_unknown_space: true
        footprint_clearing_enabled: true
        publish_voxel_map: false
        combination_method: 1
        mark_threshold: 0
        origin_z: 0.0
        unknown_threshold: 5
        z_resolution: 0.05
        z_voxels: 16
        min_obstacle_height: 0.0
        max_obstacle_height: 2.0
        min_obstacle_intensity: 0.1
        max_obstacle_intensity: 2.0
        observation_sources: terrain_map_ext
        terrain_map_ext:
          data_type: PointCloud2
          topic: <robot_namespace>/terrain_map_ext
          sensor_frame: front_mid360
          min_obstacle_height: 0.0
          max_obstacle_height: 2.0
          obstacle_max_range: 10.0
          obstacle_min_range: 0.2
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 4.0
        inflation_radius: 0.8         # 0.6 → 0.8
      always_send_full_costmap: False

map_server:
  ros__parameters:
    yaml_filename: ""

map_saver:
  ros__parameters:
    use_sim_time: false
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

# =============================================================================
# 规划器 —— DUBIN 暂时保持，四足可原地转向
# =============================================================================
planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 10.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_smac_planner/SmacPlannerHybrid"
      tolerance: 0.25                 # 0.3 → 0.25 (四足到位精度稍高)
      allow_unknown: true
      downsample_costmap: false
      downsampling_factor: 1
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 3.5
      cost_travel_multiplier: 1.7
      motion_model_for_search: "DUBIN"
      angle_quantization_bins: 64
      analytic_expansion_ratio: 3.5
      analytic_expansion_max_length: 3.6
      minimum_turning_radius: 0.0     # 0.07 → 0.0 (四足可原地转向)
      retrospective_penalty: 0.07
      reverse_penalty: 1.0
      change_penalty: 0.0
      non_straight_penalty: 1.20
      cost_penalty: 1.8
      rotation_penalty: 5.0
      lookup_table_size: 20.0
      cache_obstacle_heuristic: True
      allow_reverse_expansion: False
      smooth_path: True
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10
        do_refinement: true

smoother_server:
  ros__parameters:
    use_sim_time: false
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

# =============================================================================
# 行为服务器 —— 使用标准 Nav2 BackUp 替代轮式 BackUpFreeSpace
# =============================================================================
behavior_server:
  ros__parameters:
    use_sim_time: false
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp" # 标准备份，非轮式 BackUpFreeSpace
    drive_on_heading:
      plugin: "nav2_behaviors/DriveOnHeading"
    wait:
      plugin: "nav2_behaviors/Wait"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_footprint
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: 0.4
    rotational_acc_lim: 3.2

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

# =============================================================================
# 速度平滑器 —— 四足加速度大幅限制
# =============================================================================
velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: False
    feedback: "OPEN_LOOP"
    max_velocity: [1.2, 1.2, 1.2]    # [3.5, 3.5, 5.0] → [1.2, 1.2, 1.2]
    min_velocity: [-1.2, -1.2, -1.2]
    max_accel: [0.8, 0.8, 1.0]       # [4.5, 4.5, 5.0] → [0.8, 0.8, 1.0]
    max_decel: [-0.8, -0.8, -1.0]
    odom_topic: "odometry"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
